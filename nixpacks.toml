# Railway build config — installs Chromium for Playwright
# System libs are provided via nix; Playwright downloads its own Chromium binary.
# Note: do NOT include "chromium" in nixPkgs — it conflicts with Playwright's managed binary.
# Note: do NOT use --with-deps — it tries apt which doesn't work on NixOS.
[phases.setup]
nixPkgs = [
  "nss",
  "nspr",
  "alsa-lib",
  "atk",
  "cups",
  "libdrm",
  "mesa",
  "pango",
  "cairo",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb",
  "libxkbcommon",
  "gtk3",
  "dbus",
  "expat",
  "glib",
  "glibc",
  "xorg.libXcursor",
  "xorg.libXi",
  "xorg.libXtst",
  "at-spi2-atk",
  "at-spi2-core",
]

[phases.install]
cmds = [
  "npm i -g pnpm && pnpm install",
  "pnpm exec playwright install chromium",
]

[start]
cmd = "pnpm start"
