# Railway build config — uses nix-installed Chromium for Playwright.
# Playwright's pre-compiled binaries are built for Ubuntu/glibc and don't
# work on NixOS. Instead we install the nix 'chromium' package and point
# Playwright to it via executablePath at runtime.
[phases.setup]
nixPkgs = [
  "chromium",
  "nss",
  "nspr",
  "alsa-lib",
  "atk",
  "cups",
  "libdrm",
  "mesa",
  "pango",
  "cairo",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb",
  "libxkbcommon",
  "gtk3",
  "dbus",
  "glib",
  "expat",
  "at-spi2-atk",
  "at-spi2-core",
]

[phases.install]
dependsOn = ["setup"]
# PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 must be set at the phase level so it
# applies to pnpm install (which runs Playwright's postinstall script).
# Setting it only on a command prefix (CMD=1 echo ...) does NOT affect pnpm.
cmds = ["npm i -g pnpm && pnpm install"]

[phases.install.env]
PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"

[start]
cmd = "pnpm start"
