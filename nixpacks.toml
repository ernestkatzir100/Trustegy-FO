# Railway build config for Playwright.
# Installs system libs via nix, then downloads Playwright's own Chromium
# to /app/.playwright-browsers (persists in container image).
# Railway env var PLAYWRIGHT_BROWSERS_PATH=/app/.playwright-browsers
# tells Playwright where to find the browser at runtime.

[phases.setup]
nixPkgs = [
  "nss",
  "nspr",
  "alsa-lib",
  "atk",
  "cups",
  "libdrm",
  "mesa",
  "pango",
  "cairo",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb",
  "libxkbcommon",
  "gtk3",
  "dbus",
  "glib",
  "expat",
  "at-spi2-atk",
  "at-spi2-core",
  "xorg.libXcursor",
  "xorg.libXi",
  "xorg.libXtst",
]

[phases.install]
cmds = [
  "npm i -g pnpm && PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 pnpm install",
  "PLAYWRIGHT_BROWSERS_PATH=/app/.playwright-browsers pnpm exec playwright install chromium || echo '[nixpacks] Playwright chromium install failed — scraper will not work'",
]

[start]
cmd = "pnpm start"
